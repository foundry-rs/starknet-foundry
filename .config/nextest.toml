[profile.default]
fail-fast = false
retries = 0

[test-groups]
devnet-sequential = { max-threads = 1 }
ledger = { max-threads = 1 }

[[profile.default.overrides]]
filter = 'package(sncast) and (test(/^e2e::/) | test(/^integration::/) | test(/^docs_snippets::/) | test(/^helpers::devnet_provider::/) | test(/^helpers::devnet_detection::/))'
test-group = "devnet-sequential"

[[profile.default.overrides]]
filter = 'package(sncast) and (test(/^e2e::devnet_accounts::/) | test(/^e2e::script::init::/))'
retries = 1

[[profile.default.overrides]]
filter = 'package(sncast) and (test(/^e2e::ledger::/) | test(/^docs_snippets::ledger::/))'
test-group = "ledger"
retries = 3

[[profile.default.overrides]]
filter = 'package(sncast) and test(=e2e::devnet_accounts::use_devnet_account_with_network_flags)'
retries = { backoff = "exponential", count = 3, delay = "5s" }

[[profile.default.overrides]]
filter = 'package(sncast) and test(=e2e::script::general::test_incompatible_sncast_std_version)'
retries = { backoff = "exponential", count = 3, delay = "5s" }

[[profile.default.overrides]]
filter = 'package(sncast) and test(=e2e::tx_status::test_incorrect_transaction_hash)'
retries = 2

[[profile.default.overrides]]
filter = 'package(sncast) and test(=integration::wait_for_tx::test_wait_for_nonexistent_tx)'
retries = 2

[[profile.default.overrides]]
filter = 'package(sncast) and test(=e2e::main_tests::test_happy_case_predefined_network)'
retries = { backoff = "exponential", count = 3, delay = "5s" }

[[profile.default.overrides]]
filter = 'package(forge) and test(=e2e::running::simple_package_with_git_dependency)'
retries = { backoff = "exponential", count = 3, delay = "5s" }

# With the default alphabetical test order, this test can cause an "already declared" error. Run it last to avoid that.
[[profile.default.overrides]]
filter = 'package(sncast) and test(=e2e::declare_from::test_happy_case)'
priority = -100
