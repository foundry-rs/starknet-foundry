# Global config used in tests (SNFOUNDRY_CONFIG). Values differ from local correct_snfoundry.toml.

[sncast.default]
url = "http://127.0.0.1:5050/rpc"
accounts-file = "/global/accounts.json"
account = "global_default_user"
wait-params = { timeout = 120, retry-interval = 3 }

[sncast.global_only_profile]
url = "http://127.0.0.1:5050/rpc"
accounts-file = "/global/accounts.json"
account = "global_profile_user"
block-explorer = "Voyager"

[sncast.profile2]
# Same profile name as local; in merge, local overrides. Different values here to verify override.
url = "http://127.0.0.1:5050/rpc"
account = "global_profile2_user"
block-explorer = "Voyager"
